name: Build (Nuitka CLI)

# Separate workflow: builds a fast, small CLI-only binary using Nuitka.
# Runs on demand or on release tags. Does NOT include the TUI.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-cli-nuitka:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cfm-cli-linux-amd64
          - os: windows-latest
            artifact: cfm-cli.exe
          - os: macos-latest
            artifact: cfm-cli-darwin-amd64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies + Nuitka
        run: |
          uv sync
          uv pip install nuitka ordered-set

      - name: Build CLI with Nuitka (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          uv run python -m nuitka \
            --onefile \
            --output-filename=cfm-cli \
            --output-dir=dist \
            --include-package=cfmanager \
            --include-package=cloudflare \
            --include-package=typer \
            --include-package=rich \
            --include-package=dotenv \
            --nofollow-import-to=textual \
            --nofollow-import-to=boto3 \
            --nofollow-import-to=botocore \
            src/cfmanager/__main__.py

      - name: Build CLI with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run python -m nuitka `
            --onefile `
            --output-filename=cfm-cli.exe `
            --output-dir=dist `
            --include-package=cfmanager `
            --include-package=cloudflare `
            --include-package=typer `
            --include-package=rich `
            --include-package=dotenv `
            --nofollow-import-to=textual `
            --nofollow-import-to=boto3 `
            --nofollow-import-to=botocore `
            src/cfmanager/__main__.py

      - name: Rename artifact
        if: runner.os != 'Windows'
        run: mv dist/cfm-cli dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
